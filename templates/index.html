 <!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Universal Summarizer</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
  <!-- Title in the middle -->
  <header class="header">
    <h1 class="title-text">Universal Summarizer</h1>
  </header>

  <!-- Tabs below the title -->
  <main class="main-content">
    <div class="tabs-container">
      <div class="tabs-header">
        <button class="tab-btn active" id="youtube-tab">YouTube</button>
        <button class="tab-btn" id="file-tab">File Upload</button>
      </div>

      <!-- YouTube Tab -->
      <div class="tab-content active" id="youtube-content">
        <input type="text" class="url-input" placeholder="Paste YouTube URL here">
        <button class="btn-generate" id="youtube-btn">Generate Summary</button>
      </div>

      <!-- File Upload Tab -->
      <div class="tab-content" id="file-content">
        <input type="file" id="file-input">
        <button class="btn-generate" id="file-btn">Generate Summary</button>
      </div>
    </div>
  </main>

  <!-- Footer with your name centered -->
  <footer>
    <p>Made by <strong>Sai Tharun Vaddepalli</strong></p>
  </footer>

  <!-- Floating Settings Button -->
  <button id="settings-btn" class="settings-btn">⚙️</button>

  <!-- Slide‑in Settings Panel -->
  <div id="settings-panel" class="settings-panel">
    <h2>Configuration</h2>
    <div class="form-group">
      <label for="summary-style">Summary Style</label>
      <select id="summary-style">
        <option>Executive Summary</option>
        <option>Detailed</option>
        <option>Bullet Points</option>
      </select>
    </div>
    <div class="form-group">
      <label for="target-length">Target Length</label>
      <input type="range" id="target-length" min="1" max="3">
      <div class="range-labels">
        <span>Short</span><span>Medium</span><span>Long</span>
      </div>
    </div>
    <button id="close-panel" class="close-btn">✖ Close</button>
  </div>

  <!-- JavaScript -->
  <script>
    const youtubeTab = document.getElementById('youtube-tab');
    const fileTab = document.getElementById('file-tab');
    const youtubeContent = document.getElementById('youtube-content');
    const fileContent = document.getElementById('file-content');
    const youtubeBtn = document.getElementById('youtube-btn');
    const fileBtn = document.getElementById('file-btn');
    const settingsBtn = document.getElementById('settings-btn');
    const panel = document.getElementById('settings-panel');
    const closeBtn = document.getElementById('close-panel');

    // Tab switching
    youtubeTab.addEventListener('click', () => {
      youtubeTab.classList.add('active');
      fileTab.classList.remove('active');
      youtubeContent.classList.add('active');
      fileContent.classList.remove('active');
    });

    fileTab.addEventListener('click', () => {
      fileTab.classList.add('active');
      youtubeTab.classList.remove('active');
      fileContent.classList.add('active');
      youtubeContent.classList.remove('active');
    });

    // Buttons
    youtubeBtn.addEventListener('click', () => {
      alert('YouTube summary triggered!');
    });
    fileBtn.addEventListener('click', () => {
      alert('File summary triggered!');
    });

    // Settings panel
    settingsBtn.addEventListener('click', () => panel.classList.add('active'));
    closeBtn.addEventListener('click', () => panel.classList.remove('active'));
  </script>
</body>
</html>
