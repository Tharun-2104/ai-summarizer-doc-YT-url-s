 <!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Universal Summarizer</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <!-- Header -->
  <header class="header">
    <h1 class="title-text">Universal Summarizer</h1>
    <p class="subtitle-text">Summarize YouTube videos, documents, and more</p>
  </header>

  <!-- Main Content -->
  <main class="main-content">
    <div class="tabs-container">
      <div class="tabs-header">
        <button class="tab-btn active">YouTube</button>
        <button class="tab-btn">File Upload</button>
        <button class="tab-btn">Text</button>
      </div>
      <div class="tab-content active">
        <div class="upload-area">
          <label class="file-label">
            <i class="fas fa-upload"></i>
            <span>Upload or paste a link</span>
            <input type="file">
          </label>
        </div>
        <input type="text" class="url-input" placeholder="Paste YouTube URL here">
        <button class="btn-generate">Generate Summary</button>
      </div>
    </div>

    <!-- Result Area -->
    <div class="result-container">
      <div class="summary-card">
        <h3><i class="fas fa-align-left"></i> Summary</h3>
        <p class="summary-text">Your summary will appear here...</p>
        <button class="btn-download">⬇ Download</button>
      </div>
    </div>
  </main>

  <!-- Footer -->
  <footer>
    Made by <strong>Sai Tharun Vaddepalli</strong>
  </footer>

  <!-- Floating Settings Button -->
  <button id="settings-btn" class="settings-btn">⚙️</button>

  <!-- Slide‑in Settings Panel -->
  <div id="settings-panel" class="settings-panel">
    <h2>Configuration</h2>
    <div class="form-group">
      <label for="summary-style">Summary Style</label>
      <select id="summary-style">
        <option>Executive Summary</option>
        <option>Detailed</option>
        <option>Bullet Points</option>
      </select>
    </div>
    <div class="form-group">
      <label for="target-length">Target Length</label>
      <input type="range" id="target-length" min="1" max="3">
      <div class="range-labels">
        <span>Short</span><span>Medium</span><span>Long</span>
      </div>
    </div>
    <button id="close-panel" class="close-btn">✖ Close</button>
  </div>

  <!-- JavaScript -->
  <script>
    const settingsBtn = document.getElementById('settings-btn');
    const panel = document.getElementById('settings-panel');
    const closeBtn = document.getElementById('close-panel');

    settingsBtn.addEventListener('click', () => {
      panel.classList.add('active');
    });

    closeBtn.addEventListener('click', () => {
      panel.classList.remove('active');
    });
  </script>
</body>
</html>
